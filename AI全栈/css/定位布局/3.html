<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 300px;
            height: 300px;
            border : 2px solid red;
            position: relative;
        }
        .wrap{
            /*width: 50px;
            height: 50px;*/
            background-color: red;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="wrap">hello</div>
        <div class="帆帆"></div>
    </div>
    <h2>标题</h2>

    
</body>
</html>
