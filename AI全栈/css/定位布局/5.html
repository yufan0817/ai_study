<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 200vh;/*view-height是可视区域的高度，100vh是页面的100%*/
            width: 200vh;
        }
        .box{
            width: 500px;
            height: 500px;
            background-color: rgb(197, 112, 112);
            /*position:sticky;
            left:0;*/
           /* z-index: 100;
            position: relative;*/
            position: absolute;
            z-index: 1;
        }
        .box2{
            height: 100px;
            background-color: #7672e0;
            position: sticky;
            top:0;
        }
        .wrap{
            width: 50px;
            height: 50px;
            background-color: rgb(218, 96, 180);
            position: sticky;
            top:0;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="wrap"></div>

    </div>
    <div class="box2"></div>
</body>
</html>
